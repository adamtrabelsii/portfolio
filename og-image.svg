<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="75%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#d4744a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0b0b0d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0b0d"/>

  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Name: Adam -->
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="#e8e6e0" letter-spacing="-4">Adam</text>

  <!-- Name: Trabelsi (accent color) -->
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="#d4744a" letter-spacing="-4">Trabelsi</text>

  <!-- Tagline -->
  <text x="80" y="440" font-family="monospace" font-size="26" fill="#7a7880" letter-spacing="1">Full-Stack Developer · Madrid</text>

  <!-- Divider -->
  <rect x="80" y="480" width="60" height="2" fill="#d4744a" opacity="0.6"/>

  <!-- Domain -->
  <text x="80" y="560" font-family="monospace" font-size="22" fill="#d4744a" letter-spacing="1" opacity="0.8">adamtrabelsi.com</text>
</svg>
